services:
  - type: web
    name: shl-assessment-advisor
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python catalog/fetch_catalog.py && python catalog/build_index.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set via Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Memory optimization for 512MB limit
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
    healthCheckPath: /health
